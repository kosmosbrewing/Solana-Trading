name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'solana-momentum-bot/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana-momentum-bot
    env:
      SOLANA_RPC_URL: 'https://dummy-rpc.example.com'
      WALLET_PRIVATE_KEY: 'dummy-key-for-ci'
      BIRDEYE_API_KEY: 'dummy-birdeye-key'
      DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: solana-momentum-bot/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/solana-momentum-bot
            git pull origin main
            npm ci --production
            npm run build
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
