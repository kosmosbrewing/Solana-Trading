name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      SOLANA_RPC_URL: 'https://dummy-rpc.example.com'
      WALLET_PRIVATE_KEY: 'dummy-key-for-ci'
      BIRDEYE_API_KEY: 'dummy-birdeye-key'
      DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run docs:lint
      - run: npm run build
      - run: npm run lint
      - run: npm test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Solana/Solana-Trading/solana-momentum-bot
            git pull origin main
            npm ci --production=false
            npm run build
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 restart helius-collector --update-env || true
            pm2 save
