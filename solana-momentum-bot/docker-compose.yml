version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum_secret
      POSTGRES_DB: momentum_bot
    # Why: 1GB VPS 환경 — 기본 설정은 300MB+ 소비, 제한으로 ~150MB로 절약
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c max_connections=20
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
    mem_limit: 200m
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momentum"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://momentum:momentum_secret@timescaledb:5432/momentum_bot
    restart: unless-stopped

volumes:
  timescale_data:
