version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum_secret
      POSTGRES_DB: momentum_bot
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momentum"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://momentum:momentum_secret@timescaledb:5432/momentum_bot
    restart: unless-stopped

volumes:
  timescale_data:
